<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Reaction Game - Catch the Cubes!</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            font-family: Arial, sans-serif;
        }
        
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
        }
        
        #scoreContainer {
            margin-bottom: 15px;
            display: flex;
            gap: 30px;
            align-items: center;
        }
        
        #score, #maxScore {
            font-size: 24px;
            font-weight: bold;
            color: white;
            margin: 0;
            padding: 0;
        }
        
        #target {
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
        }
        
        #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: white;
            display: none;
            z-index: 100;
        }
        
        #gameOverScreen h1 {
            font-size: 48px;
            margin: 0 0 20px 0;
        }
        
        #gameOverScreen p {
            font-size: 24px;
            margin: 10px 0;
        }
        
        #restartButton {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        #restartButton:hover {
            background-color: #45a049;
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Three.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Game UI -->
    <div id="ui">
        <div id="scoreContainer">
            <div id="score">Score: <span id="scoreValue">0</span></div>
            <div id="maxScore">Max Score: <span id="maxScoreValue">0</span></div>
        </div>
        <div id="target">Target: <span id="targetColor">BLUE</span></div>
    </div>
    
    <div id="instructions">
        <p>← → or A/D to move | R to restart | M to reset max score</p>
    </div>
    
    <div id="gameOverScreen">
        <h1>GAME OVER!</h1>
        <p>Wrong Color Caught!</p>
        <p id="finalScore">Final Score: 0</p>
        <p style="font-size: 16px; margin-top: 20px;">Press R to restart | Press M to reset max score</p>
        <button id="restartButton">Restart Game</button>
    </div>
    
    <script>
        // ============================================
        // SCENE SETUP
        // ============================================
        // Create the Three.js scene, camera, and renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.z = 30;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // ============================================
        // LIGHTING
        // ============================================
        // Ambient light (overall brightness)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        // Directional light (creates shadows)
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        scene.add(directionalLight);
        
        // ============================================
        // PLAYER PLATFORM
        // ============================================
        // Create a rectangular platform that the player controls
        const platformGeometry = new THREE.BoxGeometry(8, 1, 3);
        const platformMaterial = new THREE.MeshStandardMaterial({ color: 0x4CAF50 });
        const platform = new THREE.Mesh(platformGeometry, platformMaterial);
        platform.position.y = -18;
        platform.receiveShadow = true;
        platform.castShadow = true;
        scene.add(platform);
        
        // Platform movement settings
        const platformSpeed = 0.8;
        const platformMaxX = 20;
        const keys = {};
        
        // ============================================
        // GAME STATE
        // ============================================
        let score = 0;
        let maxScore = 0;
        let gameOver = false;
        const colors = {
            RED: { value: 0xff4444, name: 'RED' },
            BLUE: { value: 0x4444ff, name: 'BLUE' },
            GREEN: { value: 0x44ff44, name: 'GREEN' }
        };
        
        let targetColor = colors.BLUE;
        let targetColorIndex = 1; // 0 = RED, 1 = BLUE, 2 = GREEN
        
        // ============================================
        // FALLING CUBES SYSTEM
        // ============================================
        const cubes = [];
        const cubeSpeed = 0.3;
        const spawnRate = 60; // spawn a new cube every 60 frames (~1 second at 60 FPS)
        let spawnTimer = 0;
        
        function createCube() {
            // Randomly select a color
            const colorIndex = Math.floor(Math.random() * 3);
            const colorData = Object.values(colors)[colorIndex];
            
            // Create cube geometry
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshStandardMaterial({ color: colorData.value });
            const cube = new THREE.Mesh(geometry, material);
            
            // Random horizontal position (left to right)
            cube.position.x = (Math.random() - 0.5) * 40;
            cube.position.y = 25;
            cube.position.z = 0;
            
            cube.castShadow = true;
            cube.receiveShadow = true;
            
            // Store color info on the cube object
            cube.colorIndex = colorIndex;
            cube.colorName = colorData.name;
            
            scene.add(cube);
            cubes.push(cube);
        }
        
        // ============================================
        // COLLISION DETECTION
        // ============================================
        function checkCollisions() {
            // Check each cube for collision with platform
            for (let i = cubes.length - 1; i >= 0; i--) {
                const cube = cubes[i];
                
                // Simple AABB (Axis-Aligned Bounding Box) collision
                // Check if cube is within platform's bounds
                const cubeRadius = 1;
                const platformWidth = 4;
                const platformDepth = 1.5;
                
                const colliding = 
                    Math.abs(cube.position.x - platform.position.x) < platformWidth + cubeRadius &&
                    Math.abs(cube.position.y - platform.position.y) < 1 + cubeRadius &&
                    Math.abs(cube.position.z - platform.position.z) < platformDepth + cubeRadius;
                
                if (colliding) {
                    // Remove the cube from scene and array
                    scene.remove(cube);
                    cubes.splice(i, 1);
                    
                    // Check if it's the correct color
                    if (cube.colorIndex === targetColorIndex) {
                        score++;
                        updateScore();
                        playCatchSound();
                        changeTargetColor();
                    } else {
                        // Wrong color caught - game over!
                        endGame();
                    }
                }
            }
        } 
        
        // ============================================
        // GAME STATE FUNCTIONS
        // ============================================
        function updateScore() {
            document.getElementById('scoreValue').textContent = score;
            // Update max score if current score is higher
            if (score > maxScore) {
                maxScore = score;
                document.getElementById('maxScoreValue').textContent = maxScore;
            }
        }
        
        function resetMaxScore() {
            maxScore = 0;
            document.getElementById('maxScoreValue').textContent = '0';
        }
        
        function changeTargetColor() {
            // Randomly select a new target color
            targetColorIndex = Math.floor(Math.random() * 3);
            targetColor = Object.values(colors)[targetColorIndex];
            document.getElementById('targetColor').textContent = targetColor.name;
            
            // Update the target display color
            const targetElement = document.getElementById('target');
            targetElement.style.backgroundColor = '#' + targetColor.value.toString(16).padStart(6, '0');
            
            // Change platform color to match target color
            platformMaterial.color.setHex(targetColor.value);
        }
        
        function endGame() {
            gameOver = true;
            document.getElementById('gameOverScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = 'Final Score: ' + score;
            playGameOverSound();
        }
        
        function restartGame() {
            // Reset game state
            score = 0;
            gameOver = false;
            targetColorIndex = 1;
            targetColor = colors.BLUE;
            
            // Remove all cubes from scene
            for (let i = cubes.length - 1; i >= 0; i--) {
                scene.remove(cubes[i]);
            }
            cubes.length = 0;
            
            // Reset UI
            updateScore();
            document.getElementById('targetColor').textContent = targetColor.name;
            const targetElement = document.getElementById('target');
            targetElement.style.backgroundColor = '#' + targetColor.value.toString(16).padStart(6, '0');
            
            // Update platform color to match initial target color
            platformMaterial.color.setHex(targetColor.value);
            
            // Hide game over screen
            document.getElementById('gameOverScreen').style.display = 'none';
            
            // Reset platform position
            platform.position.x = 0;
            
            // Reset spawn timer
            spawnTimer = 0;
        }
        
        // ============================================
        // SOUND EFFECTS
        // ============================================
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playCatchSound() {
            // Create a pleasant "ding" sound for successful catch
            const now = audioContext.currentTime;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, now);
            oscillator.frequency.exponentialRampToValueAtTime(600, now + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            
            oscillator.start(now);
            oscillator.stop(now + 0.15);
        }
        
        function playGameOverSound() {
            // Create a "buzz" sound for game over
            const now = audioContext.currentTime;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(200, now);
            oscillator.frequency.setValueAtTime(150, now + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            
            oscillator.start(now);
            oscillator.stop(now + 0.3);
        }
        
        // ============================================
        // INPUT HANDLING
        // ============================================
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            // Restart key
            if (e.key === 'r' || e.key === 'R') {
                restartGame();
            }
            
            // Reset max score key
            if (e.key === 'm' || e.key === 'M') {
                resetMaxScore();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // Button click handler
        document.getElementById('restartButton').addEventListener('click', restartGame);
        
        // ============================================
        // ANIMATION LOOP
        // ============================================
        function animate() {
            requestAnimationFrame(animate);
            
            if (!gameOver) {
                // Move platform left/right
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                    platform.position.x = Math.max(-platformMaxX, platform.position.x - platformSpeed);
                }
                if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                    platform.position.x = Math.min(platformMaxX, platform.position.x + platformSpeed);
                }
                
                // Update cubes (fall down and remove if off-screen)
                for (let i = cubes.length - 1; i >= 0; i--) {
                    cubes[i].position.y -= cubeSpeed;
                    
                    // Remove cube if it goes off the bottom of screen
                    if (cubes[i].position.y < -30) {
                        scene.remove(cubes[i]);
                        cubes.splice(i, 1);
                    }
                }
                
                // Spawn new cubes periodically
                spawnTimer++;
                if (spawnTimer >= spawnRate) {
                    createCube();
                    spawnTimer = 0;
                }
                
                // Check for collisions
                checkCollisions();
            }
            
            // Render the scene
            renderer.render(scene, camera);
        }
        
        // ============================================
        // INITIALIZATION
        // ============================================
        // Set initial target color
        changeTargetColor();
        
        // Start the game loop
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
